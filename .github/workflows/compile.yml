name: Compile Resume

on:
  push:
    branches: [master]
    paths:
      - Resume.tex
      - resume_preamble.tex
      - resume_toggle_defaults.tex
      - resume_content.tex
      - .github/workflows/compile.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Compile public resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Resume.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -jobname=Resume

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Resume (latest)
          make_latest: true
          files: Resume.pdf
