name: Compile Resume

on:
  push:
    branches: [master]
    paths:
      - Resume.tex
      - resume_preamble.tex
      - resume_toggle_defaults.tex
      - resume_content.tex
      - .github/workflows/compile.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create public_email.txt from secret
        run: |
          [ -n '${{ secrets.PUBLIC_EMAIL }}' ] || { echo "SECRET PUBLIC_EMAIL is not set" >&2; exit 1; }
          echo '${{ secrets.PUBLIC_EMAIL }}' > public_email.txt

      - name: Compile public resume
        uses: xu-cheng/latex-action@v3
        with:
          root_file: Resume.tex
          compiler: pdflatex
          args: -interaction=nonstopmode -halt-on-error -jobname=Resume

      - name: Get current date
        id: date
        run: echo "date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Publish to GitHub Releases (latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Resume (latest)
          make_latest: true
          files: Resume.pdf

      - name: Publish to GitHub Releases (dated)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.date.outputs.date }}
          name: ${{ steps.date.outputs.date }}
          make_latest: false
          files: Resume.pdf
